apiVersion: apps/v1
kind: Deployment
metadata:
  name: ach-agent
  labels:
    app: ach-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ach-agent
  template:
    metadata:
      labels:
        app: ach-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ach-agent
          # Tag is pinned by the overlay's images transformer.
          image: ghcr.io/ackstorm/ach-agent:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ACH_CONFIG_PATH
              value: "/etc/ach-agent/config.json"
          volumeMounts:
            - name: config
              mountPath: /etc/ach-agent
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: config
          secret:
            secretName: ach-agent-config  # rendered by ach-runtime operator
