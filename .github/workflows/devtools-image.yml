name: devtools-image

on:
  push:
    branches: [main]
    paths:
      - docker/devtools/Dockerfile
      - pyproject.toml
      - uv.lock
      - .github/workflows/devtools-image.yml
  pull_request:
    paths:
      - docker/devtools/Dockerfile
      - pyproject.toml
      - uv.lock
      - .github/workflows/devtools-image.yml
  workflow_dispatch:

concurrency:
  group: devtools-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: ref
        run: |
          HASH=$(sha256sum docker/devtools/Dockerfile | cut -c1-12)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$OWNER/ach-agent-devtools:$HASH" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/$OWNER/ach-agent-devtools:latest" >> "$GITHUB_OUTPUT"
          echo "buildcache=ghcr.io/$OWNER/ach-agent-devtools:buildcache" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/devtools/Dockerfile
          push: true
          tags: |
            ${{ steps.ref.outputs.image }}
            ${{ github.ref == 'refs/heads/main' && steps.ref.outputs.latest || '' }}
          cache-from: type=registry,ref=${{ steps.ref.outputs.buildcache }}
          cache-to: type=registry,ref=${{ steps.ref.outputs.buildcache }},mode=max
          provenance: false
