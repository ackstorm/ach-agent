# CodeRabbit configuration — https://docs.coderabbit.ai/configuration

language: en-US

reviews:
  profile: chill            # lighter feedback; skip minor/nitpicky comments
  request_changes_workflow: false
  high_level_summary: false
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

chat:
  auto_reply: true

tone_instructions: |
  Be concise and direct. Focus on actionable, substantive feedback only.
  Skip stylistic nitpicks unless they change meaning. Use US English.

early_access: false
