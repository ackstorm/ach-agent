# ach-agent development services
#
# Try the agent in TUI console mode against real ACH:
#   ACH_TOKEN=ek-... ACH_BASE_URL=https://your-ach-host docker compose run --rm harness
# (reads docker/sample-config.yaml as the contract; the typed line is the prompt).
# For a non-interactive one-shot, override the command:
#   ACH_TOKEN=ek-... ACH_BASE_URL=https://your-ach-host docker compose run --rm harness python -m ach_agent.main --prompt "hello"
# Swap the channel block in the config + drop the `--tui` command to run a real channel.
#
# mock-model is used by the round-trip integration test (docker compose up mock-model).

services:
  harness:
    build:
      context: .
      dockerfile: Dockerfile
    # --tui launch modifier (appended to the image ENTRYPOINT): run a console REPL.
    command: ["--tui"]
    environment:
      # The ek_ (passed from your shell env; never baked into the image).
      - ACH_TOKEN=${ACH_TOKEN:?set ACH_TOKEN=ek-... in your env}
      # ACH endpoint, supplied at runtime (no host baked into the repo/image).
      - ACH_BASE_URL=${ACH_BASE_URL:?set ACH_BASE_URL=https://your-ach-host in your env}
      - ACH_CONFIG_PATH=/etc/ach-agent/config.yaml
      # Model-proxy upstream override (DEV/TEST ONLY) — swap just the model backend
      # (hydration + MCP stay on ACH_BASE_URL) to A/B a different gateway, e.g. litellm
      # direct, and isolate forwarder buffering. Token is injected VERBATIM as the header
      # value, so include `Bearer ` if the backend needs it. Uses a RAW provider key, not
      # the ek_ — bypasses ACH governance; never use in production.
      # - ACH_MODEL_BASE_URL=https://your-model-gateway.example.com
      # - ACH_MODEL_HEADER=Authorization
      # - ACH_MODEL_TOKEN=Bearer ${MODEL_API_KEY}
      # Stats sink (optional — unset ACH_STATS_REDIS_URL means Prometheus-only,
      # no queue/writer). Points at the redis service below when the `stats`
      # profile is used: `docker compose --profile stats up`.
      - ACH_STATS_REDIS_URL=redis://redis:6379
      - ACH_STATS_RETENTION=3024000
      - ACH_STATS_TZ=Europe/Madrid
    volumes:
      - ./docker/sample-config.yaml:/etc/ach-agent/config.yaml:ro
    stdin_open: true   # keep STDIN open for the TUI REPL
    tty: true          # allocate a TTY (interactive console)


  mock-model:
    build:
      context: ./docker/mock-model
      dockerfile: Dockerfile
    ports:
      - "18080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ach-stats sub-project (A): usage dashboard reading the harness's ach:sessions
  # redis stream. Opt-in via profile so the default `docker compose up` (or the
  # harness-only workflows above) doesn't require redis: `docker compose
  # --profile stats up`.
  redis:
    image: redis:7-alpine
    profiles: ["stats"]
    ports:
      - "6379:6379"

  ach-stats:
    build:
      context: .
      dockerfile: docker/stats.Dockerfile
    profiles: ["stats"]
    environment:
      - ACH_STATS_REDIS_URL=redis://redis:6379
      - ACH_STATS_TZ=Europe/Madrid
    ports:
      - "8000:8000"
    depends_on:
      - redis
