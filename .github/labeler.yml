python:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.py'
      - 'pyproject.toml'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - 'Dockerfile*'
      - 'docker/**'
      - '.dockerignore'

github_actions:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'
      - 'mkdocs.yml'

kubernetes:
  - changed-files:
    - any-glob-to-any-file:
      - 'deploy/**'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'pyproject.toml'
      - 'uv.lock'
