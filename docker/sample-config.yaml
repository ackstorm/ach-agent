# Minimal ACH agent contract — hand-authored for LOCAL dry-runs.
#
# In production the operator renders this SAME schema to JSON from your CRD. Locally
# you skip k8s + the operator and write it by hand, then drive the engine directly:
#
#   ACH_TOKEN=ek-... python -m ach_agent.main --tui            # interactive console
#   ACH_TOKEN=ek-... python -m ach_agent.main --prompt "hi"    # one-shot, then exit
#
# Only FOUR blocks are strictly required (everything else has safe defaults):
#   schemaVersion, agent, model, capability.ach
# The "deployment profile" (cpu/mem, replicas, scaling) is NOT here — the operator
# consumes that to build the Deployment; it never reaches the harness contract.

schemaVersion: "1"          # must be the quoted string "1" (unquoted 1 is rejected)

agent:
  name: local-dev-agent     # name only — namespace/generation are not part of the contract

model:
  name: gemini.gemini-flash-latest   # an ACH-served model id
  type: openai                       # the ACH compat WIRE, not the vendor:
                                     #   gemini.* models are served on the /v1 (openai) wire

capability:
  type: ach
  ach: {}
    # baseUrl is supplied at runtime from the ACH_BASE_URL env var, e.g.
    #   docker run -it -e ACH_TOKEN=ek-... -e ACH_BASE_URL=https://your-ach-host ...
    # (you may also pin it here as `baseUrl: https://your-ach-host`; the env wins if both).
    # environment is implicit — your EK scopes it server-side (defaults to "platform").
  # Optional governance gate ABOVE the model — withhold capabilities before they are offered.
  # tool ids MUST match opencode's MCP tool names (the boot probe logs each server's tools).
  # filter:
  #   exclude:
  #     tools: ["gitlab_merge_merge_request"]
  #     mcpServers: ["dangerous-admin"]
  #     skills: ["send-email"]

# Optional — the inline agent persona. Layered (append) on top of the skills/prompts
# hydrated from ACH. Drop this block to rely solely on ACH-provisioned context.
prompt:
  system:
    type: text
    text: "You are a concise software-engineering assistant."
  compose: append

# Optional memory (fail-open). `bank` is the static memory bank_id (the agent's mission
# namespace). Per-event tag partitioning is a separate future layer — not configured here.
# memory:
#   endpoint: http://hindsight.engineering.svc:8080
#   mission: "AI code reviewer"
#   bank: gitlab-pr-review
#   mentalModels: [architecture, conventions]

# Engine knobs (harness-local; operator-optional). workDir + startupTimeoutSeconds live here.
# opencode's subprocess env is built clean-slate: it inherits ONLY a small base allowlist
# (PATH, SHELL, LANG, …) — never the harness secrets, so the ek_ (ACH_TOKEN/ACH_API_KEY)
# cannot reach opencode in proxy mode. forwardEnv lists extra env var NAMES to forward from
# the harness env (e.g. a custom CA bundle path). NEVER list the ek_.
engine:
  # home: where opencode keeps its config, hydrated skills, sessions, node_modules.
  # workDir: the agent's working directory (defaults to <home>/workspace).
  # Omit both to derive from persistence (enabled → <mountPath>/home; else /tmp/ach-home).
  home: /tmp/ach-home
  workDir: /tmp/ach-home/workspace
  startupTimeoutSeconds: 30
  # idleTtlSeconds: 60   # keep an idle agente warm this long (0 = stop after each turn).
  #                      # Enables channel.session:auto continuity + skips cold starts. --tui
  #                      # already holds the agente for the whole REPL, so this is a no-op there.
  # maxToolCalls: 0      # runaway control: abort a turn after N distinct tool calls + wrap-up
  #                      # turn (0 = off; maxInvocationSeconds is the always-on time backstop).
  # forwardEnv:
  #   - SSL_CERT_FILE

# Local writable scratch dir (uid 10001 inside the container). persistence.enabled:false
# keeps the dry-run volume-free.
persistence:
  enabled: false
  mountPath: /tmp/ach-state

# No channels under --tui/--prompt: the typed/passed line IS the prompt. To exercise a
# real channel instead, add it here and launch WITHOUT --tui/--prompt. Each channel's
# `concurrency` is a per-channel sub-cap under the global limits.maxConcurrentInvocations.
# Example webhook with the static-secret header_token auth:
#
# channels:
#   - name: generic-hook
#     type: webhook
#     source: generic
#     concurrency: 2
#     webhook:
#       auth:
#         type: header_token          # gitlab_token | hmac | header_token | none
#         header: X-Api-Key
#         secretPath: /etc/ach-agent/secrets/generic-hook/secret
channels: []
